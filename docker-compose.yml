services:
  redis:
    image: redis:7.2-alpine
    container_name: ai-search-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # QDRANT — Vector Database
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: ai-search-qdrant
    ports:
      - "6333:6333"   # Qdrant REST API port
      - "6334:6334"   # Qdrant gRPC API port
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data: